<!DOCTYPE html>
<html>
<head>
    <title>Nandu App - Full Version</title>

    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        button {
            padding: 10px;
            margin: 5px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }

        .box {
            margin: 20px;
            padding: 20px;
            background: #1e293b;
            border-radius: 10px;
        }
    </style>
</head>

<body onload="brython()">

<h1>🎉 Multi-feature Nandu App</h1>

<div>
    <button onclick="show('groceries')">🛒 Groceries</button>
    <button onclick="show('food')">🍕 Food</button>
    <button onclick="show('money')">💰 Money</button>
    <button onclick="show('bill')">💳 Bills</button>
    <button onclick="show('movies')">🎬 Movies</button>
    <button onclick="show('songs')">🎵 Songs</button>
</div>

<div id="app" class="box"></div>

<script>
function show(type) {
    document.getElementById("app").innerHTML = `<div id="${type}"></div>`;
}
</script>

<script type="text/python">
from browser import document, html
import datetime

total = 0
food_total = 0

def show_groceries():
    box = html.DIV()

    item = html.INPUT(placeholder="Item")
    price = html.INPUT(type="number", placeholder="Price")
    btn = html.BUTTON("Add")

    list_box = html.UL()
    total_text = html.H3("Total: ₹0")

    def add(ev):
        global total
        if item.value and price.value:
            p = float(price.value)
            total += p
            list_box <= html.LI(f"{item.value} - ₹{p}")
            total_text.text = f"Total: ₹{total}"

    btn.bind("click", add)

    box <= item + price + btn + list_box + total_text
    document["app"].clear()
    document["app"] <= box

def show_food():
    box = html.DIV()

    item = html.INPUT(placeholder="Food item")
    qty = html.INPUT(type="number", placeholder="Qty")
    btn = html.BUTTON("Order")

    list_box = html.UL()
    total_text = html.H3("Total: ₹0")

    def order(ev):
        global food_total
        if item.value and qty.value:
            q = int(qty.value)
            price = 100 * q
            food_total += price
            list_box <= html.LI(f"{item.value} x {q} = ₹{price}")
            total_text.text = f"Total: ₹{food_total}"

    btn.bind("click", order)

    box <= item + qty + btn + list_box + total_text
    document["app"].clear()
    document["app"] <= box

def show_money():
    box = html.DIV()

    amt = html.INPUT(type="number", placeholder="Amount")
    name = html.INPUT(placeholder="Sender")
    btn = html.BUTTON("Transfer")

    result = html.P()

    def transfer(ev):
        if amt.value and name.value:
            now = datetime.datetime.now()
            result.text = f"₹{amt.value} transferred by {name.value} at {now}"

    btn.bind("click", transfer)

    box <= amt + name + btn + result
    document["app"].clear()
    document["app"] <= box

def show_bill():
    box = html.DIV()

    amt = html.INPUT(type="number", placeholder="Bill amount")
    btn = html.BUTTON("Pay")

    result = html.P()

    def pay(ev):
        if amt.value:
            result.text = f"Bill ₹{amt.value} paid successfully!"

    btn.bind("click", pay)

    box <= amt + btn + result
    document["app"].clear()
    document["app"] <= box

def show_movies():
    document["app"].clear()
    document["app"] <= html.UL([
        html.LI("Kalki 2898AD"),
        html.LI("Salaar"),
        html.LI("Devara")
    ])

def show_songs():
    document["app"].clear()
    document["app"] <= html.UL([
        html.LI("Peelings"),
        html.LI("Ayudha Pooja"),
        html.LI("Nenu Nuvvantu")
    ])

# mapping
def bind_buttons():
    document.select("button")[0].bind("click", lambda ev: show_groceries())
    document.select("button")[1].bind("click", lambda ev: show_food())
    document.select("button")[2].bind("click", lambda ev: show_money())
    document.select("button")[3].bind("click", lambda ev: show_bill())
    document.select("button")[4].bind("click", lambda ev: show_movies())
    document.select("button")[5].bind("click", lambda ev: show_songs())

bind_buttons()
</script>

</body>
</html>
