<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nandu App Interactive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
    }

    h1 {
        color: #38bdf8;
        margin-top: 20px;
    }

    .buttons {
        margin: 20px;
    }

    button {
        padding: 12px 20px;
        margin: 10px;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #0ea5e9;
    }

    .content {
        margin: 20px auto;
        width: 80%;
        background: #1e293b;
        padding: 20px;
        border-radius: 10px;
        text-align: left;
        white-space: pre-line;
    }
</style>

<script>
function showContent(type) {
    let content = "";

    if (type === "groceries") {
        content = `
🛒 GROCERIES MODULE

Categories:
- Dresses (Casual, Formal, Party Wear)
- Saree (Silk, Cotton, Chiffon)
- Jewellery (Necklace, Earrings)
- Electronics (Phones, Laptops)

User can:
✔ Select category
✔ Choose type & color
✔ Enter price
✔ Generate bill
        `;
    }

    else if (type === "food") {
        content = `
🍕 FOOD ORDERING

Menu:
- Pizza ₹150
- Burger ₹100
- Samosa ₹30
- Ice Cream (Vanilla, Chocolate)

User can:
✔ Select item
✔ Enter quantity
✔ View total bill
        `;
    }

    else if (type === "money") {
        content = `
💰 MONEY TRANSFER

Features:
✔ Enter amount
✔ Enter recipient
✔ Secure PIN (9966)
✔ Timestamp generated

Example:
Rs 500 transferred successfully
        `;
    }

    else if (type === "bill") {
        content = `
💳 BILL PAYMENTS

Apps:
- PhonePe
- Paytm
- Google Pay

User can:
✔ Select platform
✔ Enter biller ID
✔ Pay securely using PIN
        `;
    }

    else if (type === "movies") {
        content = `
🎬 MOVIES

- Kalki 2898AD
- Salaar
- Devara
- Guntur Karam
        `;
    }

    else if (type === "songs") {
        content = `
🎵 SONGS

- Peelings (Pushpa 2)
- Ayudha Pooja
- Nenu Nuvvantu
        `;
    }

    document.getElementById("display").innerText = content;
}
</script>

</head>

<body>

<h1>🎉 Multi-feature Nandu App</h1>

<div class="buttons">
    <button onclick="showContent('groceries')">🛒 Groceries</button>
    <button onclick="showContent('food')">🍕 Food</button>
    <button onclick="showContent('money')">💰 Money Transfer</button>
    <button onclick="showContent('bill')">💳 Bill Payment</button>
    <button onclick="showContent('movies')">🎬 Movies</button>
    <button onclick="showContent('songs')">🎵 Songs</button>
</div>

<div id="display" class="content">
👉 Click any feature above to see details
</div>

<br>

<a href="https://github.com/nandinipanyala2003/multi-feature-nandu-app" target="_blank">
    <button>🚀 View on GitHub</button>
</a>

</body>
</html>
