<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nandu App Code Viewer</title>

<style>
    body {
        font-family: monospace;
        background: #0f172a;
        color: #00ffcc;
        text-align: center;
        padding: 20px;
    }

    h1 {
        color: #38bdf8;
    }

    button {
        padding: 10px;
        margin: 5px;
        background: #1e293b;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #38bdf8;
        color: black;
    }

    pre {
        text-align: left;
        background: black;
        padding: 20px;
        border-radius: 10px;
        overflow-x: auto;
        margin-top: 20px;
    }
</style>

<script>
function showCode(type) {

    let code = "";

    if (type === "groceries") {
        code = `def groceries_billing():
    categories = {
        "Dresses": {
            "colors": ["Red", "Blue", "Green"],
            "types": ["Casual", "Formal"]
        }
    }

    items = []

    while True:
        print("Categories:", categories.keys())
        choice = input("Choose category: ")

        item = input("Enter item name: ")
        price = float(input("Enter price: "))

        items.append((item, price))

        cont = input("Continue? (y/n): ")
        if cont != 'y':
            break

    total = sum(p for i, p in items)
    print("Total:", total)
`;
    }

    else if (type === "food") {
        code = `def food_ordering():
    menu = {"Pizza":150, "Burger":100}

    orders = {}

    while True:
        print(menu)
        item = input("Choose item: ")
        qty = int(input("Quantity: "))

        orders[item] = qty

        cont = input("Continue? (y/n): ")
        if cont != 'y':
            break

    total = sum(menu[i]*q for i,q in orders.items())
    print("Total:", total)
`;
    }

    else if (type === "money") {
        code = `def payment_transfer():
    amount = float(input("Enter amount: "))
    name = input("Sender: ")
    pin = input("Enter PIN: ")

    if pin == "9966":
        print("Transfer success")
    else:
        print("Failed")
`;
    }

    else if (type === "bill") {
        code = `def bill_payments():
    amount = float(input("Enter amount: "))
    app = input("Choose app: ")
    print(f"Paid {amount} using {app}")
`;
    }

    else if (type === "movies") {
        code = `def show_movies():
    movies = ["Kalki", "Salaar", "Devara"]
    for m in movies:
        print(m)
`;
    }

    else if (type === "songs") {
        code = `def show_songs():
    songs = ["Peelings", "Ayudha Pooja"]
    for s in songs:
        print(s)
`;
    }

    document.getElementById("codeBox").innerText = code;
}
</script>

</head>

<body>

<h1>🎉 Multi-feature Nandu App (Code Viewer)</h1>

<div>
    <button onclick="showCode('groceries')">🛒 Groceries</button>
    <button onclick="showCode('food')">🍕 Food</button>
    <button onclick="showCode('money')">💰 Money</button>
    <button onclick="showCode('bill')">💳 Bills</button>
    <button onclick="showCode('movies')">🎬 Movies</button>
    <button onclick="showCode('songs')">🎵 Songs</button>
</div>

<pre id="codeBox">
👉 Click any button to view Python code
</pre>

<br>

<a href="https://github.com/nandinipanyala2003/multi-feature-nandu-app" target="_blank">
    <button>🚀 View GitHub Repo</button>
</a>

</body>
</html>
