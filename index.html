<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nandu App Simulation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: monospace;
        background: black;
        color: #00ffcc;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #38bdf8;
    }

    .menu button {
        margin: 5px;
        padding: 10px;
        background: #1e293b;
        color: white;
        border: none;
        cursor: pointer;
    }

    .menu button:hover {
        background: #38bdf8;
        color: black;
    }

    .terminal {
        margin-top: 20px;
        padding: 20px;
        background: #000;
        border: 1px solid #00ffcc;
        min-height: 300px;
        white-space: pre-line;
    }
</style>

<script>
function groceriesFlow() {
document.getElementById("screen").innerText = `
🛒 Groceries Shopping Started!

➡️ Categories:
1. Dresses
2. Saree
3. Jewellery
4. House Products
5. Electronic Gadgets

➡️ User selects: Dresses

👗 Available types:
Casual, Formal, Party Wear, Embroidery, Ghagra Choli

➡️ User selects: Party Wear

🌈 Available colors:
Red, Blue, Green, Yellow, Black

➡️ User selects: Red

📝 Enter item name: Red Party Dress
💰 Price: Rs 1200

✅ Added: Red Party Dress (Dresses, Type: Party Wear, Color: Red)

➡️ More items can be added...
➡️ Finally bill generated:

1. Red Party Dress - Rs 1200

✅ Total: Rs 1200
`;
}

function foodFlow() {
document.getElementById("screen").innerText = `
🍕 Food Ordering Started!

Menu:
1. Pizza - Rs 150
2. Burger - Rs 100
3. Samosa - Rs 30

➡️ User selects: Pizza
📦 Quantity: 2

✅ Added 2 x Pizza

➡️ Final Bill:

Pizza x 2 = Rs 300

✅ Total: Rs 300
`;
}

function moneyFlow() {
document.getElementById("screen").innerText = `
💰 Money Transfer

💵 Amount: Rs 500
👤 Recipient: user123
✍️ Sender: Nandini
🔐 PIN: ****

✅ Transfer Successful!

⏰ Date & Time:
2026-03-28 12:30:00
`;
}

function billFlow() {
document.getElementById("screen").innerText = `
💳 Bill Payment

Platforms:
1. PhonePe
2. Paytm
3. Google Pay

➡️ Selected: PhonePe

💰 Amount: Rs 800
📋 Biller ID: EB12345

🔐 PIN Entered

✅ Payment Successful!
`;
}

function moviesFlow() {
document.getElementById("screen").innerText = `
🎬 Latest Movies:

1. Kalki 2898AD
2. Salaar
3. Devara
4. Guntur Karam
`;
}

function songsFlow() {
document.getElementById("screen").innerText = `
🎵 Latest Songs:

1. Peelings - Pushpa 2
2. Ayudha Pooja - Devara
3. Nenu Nuvvantu - Orange
`;
}
</script>

</head>

<body>

<h1>🎉 Multi-feature Nandu App (Simulation)</h1>

<div class="menu">
    <button onclick="groceriesFlow()">🛒 Groceries</button>
    <button onclick="foodFlow()">🍕 Food</button>
    <button onclick="moneyFlow()">💰 Money</button>
    <button onclick="billFlow()">💳 Bills</button>
    <button onclick="moviesFlow()">🎬 Movies</button>
    <button onclick="songsFlow()">🎵 Songs</button>
</div>

<div id="screen" class="terminal">
👉 Click any feature to see how Python app works
</div>

<br>

<a href="https://github.com/nandinipanyala2003/multi-feature-nandu-app" target="_blank">
    <button>🚀 View GitHub Repo</button>
</a>

</body>
</html>
