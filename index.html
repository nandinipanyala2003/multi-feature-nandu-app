<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nandu Groceries App</title>

<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
    }

    h1 {
        color: #38bdf8;
    }

    select, input, button {
        padding: 10px;
        margin: 8px;
    }

    button {
        background: #38bdf8;
        border: none;
        cursor: pointer;
    }

    .box {
        background: #1e293b;
        padding: 20px;
        margin: 20px auto;
        width: 300px;
        border-radius: 10px;
    }

    ul {
        text-align: left;
    }
</style>

</head>

<body>

<h1>🛒 Groceries Shopping</h1>

<div class="box">

    <select id="category" onchange="loadItems()">
        <option value="">Select Category</option>
        <option value="dresses">Dresses</option>
        <option value="saree">Saree</option>
        <option value="electronics">Electronics</option>
    </select>

    <br>

    <select id="items">
        <option>Select Item</option>
    </select>

    <br>

    <input type="number" id="price" placeholder="Enter Price">

    <br>

    <button onclick="addItem()">Add Item</button>

    <ul id="list"></ul>

    <h3>Total: ₹<span id="total">0</span></h3>

</div>

<script>

let total = 0;

const data = {
    dresses: ["Casual Dress", "Party Wear", "Formal Dress"],
    saree: ["Silk Saree", "Cotton Saree", "Chiffon Saree"],
    electronics: ["iPhone", "Samsung", "Laptop"]
};

function loadItems() {
    let category = document.getElementById("category").value;
    let items = document.getElementById("items");

    items.innerHTML = "<option>Select Item</option>";

    if (category && data[category]) {
        data[category].forEach(item => {
            let option = document.createElement("option");
            option.text = item;
            items.add(option);
        });
    }
}

function addItem() {
    let item = document.getElementById("items").value;
    let price = parseFloat(document.getElementById("price").value);

    if (!item || isNaN(price)) {
        alert("Enter valid details");
        return;
    }

    let li = document.createElement("li");
    li.innerText = `${item} - ₹${price}`;
    document.getElementById("list").appendChild(li);

    total += price;
    document.getElementById("total").innerText = total;
}

</script>

</body>
</html>
